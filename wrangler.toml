name = "cf-image-worker"
main = "worker.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[vars]
# Set your actual API_KEY as a Secret via:
# wrangler secret put API_KEY
# or Cloudflare Dashboard → Worker → Settings → Variables → Add secret

# Uncomment to disable auth during local testing only:
# API_KEY = "dev-test-key"
